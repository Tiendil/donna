version = 1

# Directory where Donna will keep its state.
session_dir = ".session/donna"

# Defaults to simplify initialization of a workflow.
# Most likely you don't need to change these unless you implement a custom operation or workflow.
#
# [defaults]
# tail_section_kind = "donna.lib.text"
# primary_section_kind = "donna.lib.workflow"
# primary_section_id = "primary"

# Directories where Donna will look for workflow files.
workflow_dirs = [
    "./workflows",
    "./.session/donna",
]

# Command Donna will execute to log a workflow execution progress.
# If the command is not specified, Donna will not log anything.
#
# Example: forward journal records to a project-specific journal tool.
# [journal]
# cmd = [
#     "./bin/journal-tool.sh",
#     "record",
#     "{timestamp}",
#     "{actor_id}",
#     "{current_task_id}",
#     "{current_operation_id}",
#     "{message}",
# ]
